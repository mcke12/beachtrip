<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wiley Family Beach Vacation</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <div class="header-inner">
        <p class="header-eyebrow">Summer 2026 · Wiley Family</p>
        <h1>🏖️ Beach Vacation<br><em>& Wedding</em> Packing List</h1>
        <div class="trip-pills">
            <span class="pill beach">🌴 Beach · Jul 6–10</span>
            <span class="pill wedding">💍 Wedding · Jul 10–12</span>
        </div>
        <div class="header-bottom">
            <div id="weather-widget" class="weather-widget">
                <span class="weather-loading">Loading Jekyll Island weather…</span>
            </div>
            <div class="quote-box">
                <p id="beach-quote" class="beach-quote"></p>
            </div>
        </div>
    </div>
</header>

<div class="progress-subheader">
    <div class="progress-subheader-inner">
        <div class="progress-pct-block">
            <span id="progress-pct" class="progress-pct-num">0%</span>
            <span class="progress-pct-label">packed</span>
        </div>
        <div class="progress-right">
            <div class="progress-count-label">
                <span id="progress-text">0 of 0 items</span>
            </div>
            <div class="progress-track">
                <div class="progress-fill" id="progress-fill"></div>
            </div>
        </div>
    </div>
</div>

<main>
    <nav class="tab-nav" role="tablist">
        <button class="tab-btn active" data-tab="0" role="tab" aria-selected="true">🌴 Beach</button>
        <button class="tab-btn" data-tab="1" role="tab" aria-selected="false">💍 Wedding</button>
        <button class="tab-btn" data-tab="2" role="tab" aria-selected="false">🛒 Shopping</button>
        <button class="tab-btn" data-tab="3" role="tab" aria-selected="false">✅ Before You Leave</button>
    </nav>

    <div id="checklist"></div>
</main>

<script src="script.js"></script>
</body>
</html>
