<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vacation Packing Checklist</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <div class="header-inner">
        <p class="header-eyebrow">Summer 2026</p>
        <h1>🏖️ Beach Vacation<br><em>& Wedding</em> Packing List</h1>
        <div class="trip-pills">
            <span class="pill beach">🌴 Beach · Jul 6–10</span>
            <span class="pill wedding">💍 Wedding · Jul 10–12</span>
        </div>
    </div>
</header>

<main>
    <div class="progress-bar-wrap">
        <div class="progress-label">
            <span>Packed</span>
            <span id="progress-text">0 of 0</span>
        </div>
        <div class="progress-track">
            <div class="progress-fill" id="progress-fill"></div>
        </div>
    </div>

    <div id="checklist"></div>
</main>

<script src="script.js"></script>
</body>
</html>
